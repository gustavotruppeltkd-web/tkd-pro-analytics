<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO COACH ANALYTICS | Selecionar Treinador</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.41.1/dist/tabler-icons.min.css" />
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-dark);
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            position: relative;
        }

        /* Background glow */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            width: 800px;
            height: 500px;
            background: radial-gradient(ellipse, rgba(37, 99, 235, 0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        /* logout-btn → btn-logout from styles.css */

        .page-header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeIn 0.5s ease;
        }

        .page-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .page-logo .logo-icon {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: #fff;
            box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
        }

        .page-logo .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-main);
        }

        .page-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
            margin: 0 0 10px;
        }

        .page-subtitle {
            color: var(--text-muted);
            font-size: 16px;
            margin: 0;
        }

        /* Trainer grid */
        .coaches-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            max-width: 900px;
            animation: fadeIn 0.5s ease 0.1s both;
        }

        .coach-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px 28px;
            width: 220px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            color: inherit;
            transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .coach-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(37, 99, 235, 0.08), transparent 70%);
            opacity: 0;
            transition: opacity 0.25s ease;
        }

        .coach-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(37, 99, 235, 0.4);
            border-color: rgba(37, 99, 235, 0.5);
        }

        .coach-card:hover::before {
            opacity: 1;
        }

        .coach-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--border-color);
            margin: 0 auto 16px;
            display: block;
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
        }

        .coach-card:hover .coach-avatar {
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
        }

        .coach-name {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .coach-role {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .coach-enter-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(37, 99, 235, 0.12);
            color: #60a5fa;
            border: 1px solid rgba(37, 99, 235, 0.3);
            border-radius: 8px;
            padding: 8px 18px;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s, color 0.2s;
        }

        .coach-card:hover .coach-enter-btn {
            background: #2563eb;
            color: #fff;
            border-color: #2563eb;
        }

        .delete-coach-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            cursor: pointer;
            transition: var(--transition);
            opacity: 0;
            z-index: 20;
        }

        .coach-card:hover .delete-coach-btn {
            opacity: 1;
        }

        .delete-coach-btn:hover {
            background: #ef4444;
            color: #fff;
            transform: scale(1.1);
        }

        /* Add new trainer card */
        .coach-card.add-new {
            border-style: dashed;
            opacity: 0.7;
        }

        .coach-card.add-new:hover {
            opacity: 1;
        }

        .add-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.04);
            border: 2px dashed var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
            font-size: 28px;
            color: var(--text-muted);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 20px;
            animation: fadeIn 0.4s ease;
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            display: block;
            opacity: 0.5;
        }

        /* Loading skeleton for cards */
        .skeleton-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 32px 28px;
            width: 220px;
            text-align: center;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .skeleton-circle {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: var(--bg-hover);
            margin: 0 auto 16px;
        }

        .skeleton-line {
            height: 12px;
            border-radius: 6px;
            background: var(--bg-hover);
            margin: 0 auto 10px;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }

        .footer-note {
            margin-top: 40px;
            color: var(--text-muted);
            font-size: 12px;
            text-align: center;
            animation: fadeIn 0.5s ease 0.2s both;
        }

        /* Device Selector */
        .device-selector {
            display: flex;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 4px;
            border-radius: 14px;
            gap: 4px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease 0.15s both;
        }

        .device-option {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }

        .device-option i {
            font-size: 18px;
        }

        .device-option:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.03);
        }

        .device-option.active {
            background: var(--primary);
            color: #fff;
            box-shadow: var(--shadow-glow);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <button class="btn-logout" onclick="handleLogout()">
        <i class="ti ti-logout"></i> Sair
    </button>

    <header class="page-header">
        <div class="page-logo"
            style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px;">
            <i class="ti ti-shield-up" style="font-size: 36px; color: var(--primary);"></i>
            <h2 style="font-size: 28px; color: var(--text-main); margin: 0; font-weight: 700;">PRO COACH ANALYTICS</h2>
        </div>
        <h1 class="page-title">Quem vai treinar hoje?</h1>
        <p class="page-subtitle">Selecione o perfil do treinador para acessar o painel</p>
    </header>

    <div class="coaches-grid" id="coachesGrid">
        <!-- Populated by JS -->
    </div>

    <div class="device-selector">
        <div class="device-option" id="mode-desktop" onclick="setDeviceMode('desktop')">
            <i class="ti ti-device-desktop"></i>
            <span>Desktop</span>
        </div>
        <div class="device-option" id="mode-tablet" onclick="setDeviceMode('tablet')">
            <i class="ti ti-device-tablet"></i>
            <span>Tablet</span>
        </div>
        <div class="device-option" id="mode-mobile" onclick="setDeviceMode('mobile')">
            <i class="ti ti-device-mobile"></i>
            <span>Celular</span>
        </div>
    </div>

    <p class="footer-note">Sessão autenticada via Supabase &bull; Dados sincronizados em nuvem</p>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.103.3" integrity="sha384-Y1tzkgTMv0NgNIkhIaJiI9rqNrOLfosToPr6Bzp4XVIOvF1BUd7mNlUVPpo6G8lL" crossorigin="anonymous"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        function renderCoaches() {
            const grid = document.getElementById('coachesGrid');
            const coaches = db.treinadores || [];

            if (coaches.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="ti ti-user-off"></i>
                        <p>Nenhum treinador cadastrado ainda.<br>Preencha seu perfil para começar.</p>
                        <button class="btn-enter" onclick="openNewTrainerModal()" style="margin-top: 24px; padding: 12px 24px; font-size: 14px; max-width: 250px; margin-left: auto; margin-right: auto;">
                            <i class="ti ti-plus"></i> Cadastrar Treinador
                        </button>
                    </div>
                `;
                return;
            }

            grid.innerHTML = coaches.map(coach => `
                <div class="coach-card" onclick="selectCoach(${coach.id})">
                    <button class="delete-coach-btn" onclick="deleteTrainerData(event)" title="Excluir tudo e resetar conta">
                        <i class="ti ti-trash"></i>
                    </button>
                    <img class="coach-avatar"
                         src="${coach.avatar || 'https://cdn-icons-png.flaticon.com/512/10337/10337579.png'}"
                         alt="${coach.nome}"
                         onerror="this.src='https://cdn-icons-png.flaticon.com/512/10337/10337579.png'">
                    <div class="coach-name">${coach.nome}</div>
                    <div class="coach-role">${coach.papel || coach.role || 'Treinador'}</div>
                    <span class="coach-enter-btn">
                        <i class="ti ti-arrow-right"></i> Entrar
                    </span>
                </div>
            `).join('');
        }

        async function deleteTrainerData(event) {
            event.stopPropagation(); // Don't trigger selectCoach

            const confirmed = confirm("ATENÇÃO: Isso irá excluir PERMANENTEMENTE todos os dados desta conta (treinadores, turmas, atletas, etc) e resetar o sistema ao zero.\n\nDeseja continuar?");

            if (!confirmed) return;

            try {
                const { data: { user } } = await window.supabaseClient.auth.getUser();
                if (!user) throw new Error("Usuário não autenticado.");

                // Overwrite with empty object to force reset
                const { error } = await window.supabaseClient
                    .from('app_state')
                    .update({ data: {} })
                    .eq('project_id', user.id);

                if (error) throw error;

                // Clear everything locally
                localStorage.removeItem('tkd_scout_db');
                localStorage.removeItem('tkd_active_coach_id');

                alert("Conta resetada com sucesso! O sistema irá reiniciar.");
                location.reload();
            } catch (err) {
                console.error("Erro ao resetar conta:", err);
                alert("Erro ao excluir dados: " + (err.message || err));
            }
        }

        function selectCoach(id) {
            localStorage.setItem('tkd_active_coach_id', String(id));
            window.location.href = 'turmas.html';
        }

        async function handleLogout() {
            if (window.supabaseClient) {
                await window.supabaseClient.auth.signOut();
            }
            localStorage.removeItem('tkd_active_coach_id');
            localStorage.removeItem('tkd_scout_db');
            window.location.href = 'index.html';
        }

        function setDeviceMode(mode) {
            localStorage.setItem('tkd_device_mode', mode);

            // Apply to current body immediately
            document.body.classList.remove('mode-tablet', 'mode-mobile');
            if (mode === 'tablet') document.body.classList.add('mode-tablet');
            if (mode === 'mobile') document.body.classList.add('mode-mobile');

            updateDeviceUI();

            // Inform user
            const msg = mode === 'desktop' ? 'Modo Desktop' : (mode === 'tablet' ? 'Modo Tablet' : 'Modo Celular');
            if (window.showToast) window.showToast(`Visualização ajustada: ${msg}`, 'info');
        }

        function updateDeviceUI() {
            const current = localStorage.getItem('tkd_device_mode') || 'desktop';
            document.querySelectorAll('.device-option').forEach(el => el.classList.remove('active'));
            const activeEl = document.getElementById(`mode-${current}`);
            if (activeEl) activeEl.classList.add('active');
        }

        // Render when data is ready
        document.addEventListener('DOMContentLoaded', () => {
            // Immediately show skeleton cards while waiting for Supabase
            const grid = document.getElementById('coachesGrid');
            grid.innerHTML = [1, 2].map(() => `
                <div class="skeleton-card">
                    <div class="skeleton-circle"></div>
                    <div class="skeleton-line" style="width:60%;"></div>
                    <div class="skeleton-line" style="width:40%;"></div>
                </div>
            `).join('');

            updateDeviceUI();
        });

        // Called by app.js when Supabase data is ready — renders immediately without page reload
        window.onDataLoaded = function () {
            renderCoaches();
        };

        // Also hook into app.js data-loaded event in case Supabase fetch arrives later
        window.onDataLoaded = function () {
            renderCoaches();
        };

        function openNewTrainerModal() {
            document.getElementById('newTrainerModal').style.display = 'flex';
        }

        async function createBasicTrainer() {
            const name = document.getElementById('newTrainerName').value.trim();
            if (!name) return alert('Digite um nome válido.');

            const newId = Date.now();
            const newTrainer = {
                id: newId,
                nome: name,
                papel: 'Treinador Principal',
                avatar: 'https://cdn-icons-png.flaticon.com/512/10337/10337579.png',
                turmasIds: []
            };

            db.treinadores = db.treinadores || [];
            db.treinadores.push(newTrainer);
            saveDB();

            if (window.supabaseClient) {
                const userObj = await window.supabaseClient.auth.getUser();
                if (userObj.data && userObj.data.user) {
                    await window.supabaseClient.from('treinadores').insert([{
                        user_id: userObj.data.user.id,
                        nome: newTrainer.nome,
                        papel: newTrainer.papel
                    }]);
                }
            }

            localStorage.setItem('tkd_active_coach_id', String(newId));
            window.location.href = 'treinador-perfil.html';
        }
    </script>

    <!-- Modal Cadastrar Treinador (Fallback/Vazio) -->
    <div id="newTrainerModal"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:999; align-items:center; justify-content:center; padding:16px;">
        <div
            style="background:var(--bg-card); border:1px solid var(--border-color); border-radius:var(--radius-lg); padding:32px; width:100%; max-width:400px; animation:fadeIn 0.3s ease;">
            <h2 style="margin-top:0; color:var(--text-main); font-size:22px; font-weight:700;">Novo Treinador</h2>
            <p style="color:var(--text-muted); font-size:14px; margin-bottom:24px;">Digite seu nome para criar um perfil
                básico e entrar no sistema.</p>

            <label
                style="display:block; font-size:13px; font-weight:600; color:var(--text-muted); margin-bottom:8px;">Nome
                Completo</label>
            <input type="text" id="newTrainerName" placeholder="Seu nome"
                style="width:100%; box-sizing:border-box; padding:12px; border-radius:8px; border:1px solid var(--border-color); background:rgba(255,255,255,0.05); color:white; margin-bottom:24px;">

            <div style="display:flex; justify-content:flex-end; gap:12px;">
                <button onclick="document.getElementById('newTrainerModal').style.display='none'"
                    style="background:transparent; border:1px solid var(--border-color); color:var(--text-main); padding:10px 16px; border-radius:8px; cursor:pointer; font-weight:500;">Cancelar</button>
                <button onclick="createBasicTrainer()"
                    style="background:var(--primary); border:none; color:white; padding:10px 16px; border-radius:8px; cursor:pointer; font-weight:600;">Cadastrar</button>
            </div>
        </div>
    </div>
</body>

</html>
