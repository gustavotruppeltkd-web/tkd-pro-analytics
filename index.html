<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Coach Analytics | Autenticação</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-dark);
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .login-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow-card);
            text-align: center;
            animation: fadeIn 0.5s ease-in-out;
            z-index: 10;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light, #6366f1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
        }

        h1 {
            font-size: 24px;
            color: var(--text-main);
            margin: 0 0 8px;
            font-weight: 700;
        }

        p {
            color: var(--text-muted);
            margin: 0 0 32px;
            font-size: 14px;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border-color);
            background: var(--bg-hover);
            color: var(--text-main);
            font-size: 14px;
            transition: var(--transition);
        }

        .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            outline: none;
        }

        .btn-enter {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-enter:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.3);
        }

        .toggle-mode {
            color: var(--primary);
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-mode:hover {
            text-decoration: underline;
        }

        .error-mêsg {
            color: var(--red);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            background: var(--red-bg);
            padding: 8px;
            border-radius: var(--radius-sm);
        }

        .success-mêsg {
            color: var(--green);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 8px;
            border-radius: var(--radius-sm);
        }

        /* Background decor */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
            top: -100px;
            left: -100px;
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 24px;">
            <i class="ti ti-shield-up" style="font-size: 36px; color: var(--primary);"></i>
            <h2 style="font-size: 28px; color: var(--text-main); margin: 0; font-weight: 700;">Pro coach Analytics</h2>
        </div>
        <h1 id="formTitle">Bem-vindo(a)</h1>
        <p id="formSubtitle">Acesso Seguro Supabase</p>

        <div class="error-mêsg" id="errorMêsg"></div>
        <div class="success-mêsg" id="successMêsg"></div>

        <form id="authForm">
            <div class="input-group">
                <label>E-mail</label>
                <input type="email" class="form-control" id="email" required placeholder="seu@email.com">
            </div>
            <div class="input-group" id="passwordGroup">
                <label>Senha</label>
                <input type="password" class="form-control" id="password" required placeholder="••••••••">
            </div>

            <div style="text-align: right; margin-top: -12px; margin-bottom: 20px;" id="forgotPasswordDiv">
                <a href="#" onclick="toggleRecovery(event)"
                    style="font-size: 13px; color: var(--primary); text-decoration: none; font-weight: 600;">Esqueceu a
                    senha?</a>
            </div>

            <button type="submit" class="btn-enter" id="submitBtn">
                <i class="ti ti-login"></i> Entrar
            </button>
        </form>

        <a href="#" class="toggle-mode" id="toggleModeBtn" onclick="toggleMode(event)">
            Não tem uma conta? Cadastre-se
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let isSignup = false;
        let isRecovery = false;

        function toggleRecovery(e) {
            if (e) e.preventDefault();
            isRecovery = !isRecovery;
            const title = document.getElementById('formTitle');
            const subtitle = document.getElementById('formSubtitle');
            const btn = document.getElementById('submitBtn');
            const toggleBtn = document.getElementById('toggleModeBtn');
            const forgotDiv = document.getElementById('forgotPasswordDiv');
            const pwGroup = document.getElementById('passwordGroup');

            document.getElementById('errorMêsg').style.display = 'none';
            document.getElementById('successMêsg').style.display = 'none';

            if (isRecovery) {
                isSignup = false;
                title.innerText = "Recuperar Senha";
                subtitle.innerText = "Enviaremos as instruções para seu e-mail";
                btn.innerHTML = `<i class="ti ti-mail"></i> Enviar Link`;
                toggleBtn.innerText = "Voltar para Login";
                forgotDiv.style.display = 'none';
                pwGroup.style.display = 'none';
                document.getElementById('password').removeAttribute('required');
            } else {
                toggleMode(new Event('click'));
                toggleMode(new Event('click')); // reset to login
            }
        }

        function toggleMode(e) {
            if (e) e.preventDefault();
            if (isRecovery) {
                isRecovery = false;
                document.getElementById('passwordGroup').style.display = 'block';
                document.getElementById('password').setAttribute('required', 'true');
            }
            isSignup = !isSignup;
            const title = document.getElementById('formTitle');
            const subtitle = document.getElementById('formSubtitle');
            const btn = document.getElementById('submitBtn');
            const toggleBtn = document.getElementById('toggleModeBtn');
            const errorMêsg = document.getElementById('errorMêsg');
            const successMêsg = document.getElementById('successMêsg');
            const forgotDiv = document.getElementById('forgotPasswordDiv');

            errorMêsg.style.display = 'none';
            successMêsg.style.display = 'none';

            if (isSignup) {
                title.innerText = "Criar Conta";
                subtitle.innerText = "Criação de usuário Supabase";
                btn.innerHTML = `<i class="ti ti-user-plus"></i> Registrar`;
                toggleBtn.innerText = "Já tem uma conta? Faça Login";
                forgotDiv.style.display = 'none';
            } else {
                title.innerText = "Bem-vindo(a)";
                subtitle.innerText = "Acesso Seguro Supabase";
                btn.innerHTML = `<i class="ti ti-login"></i> Entrar`;
                toggleBtn.innerText = "Não tem uma conta? Cadastre-se";
                forgotDiv.style.display = 'block';
            }
        }

        document.getElementById('authForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMêsg = document.getElementById('errorMêsg');
            const successMêsg = document.getElementById('successMêsg');
            const btn = document.getElementById('submitBtn');

            errorMêsg.style.display = 'none';
            successMêsg.style.display = 'none';
            btn.disabled = true;
            btn.style.opacity = '0.7';

            if (isRecovery) {
                const { data, error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + window.location.pathname.replace('index.html', 'redefinir-senha.html')
                });

                if (error) {
                    errorMêsg.innerText = error.message;
                    errorMêsg.style.display = 'block';
                } else {
                    successMêsg.innerText = "E-mail de recuperação enviado! Verifique sua caixa de entrada.";
                    successMêsg.style.display = 'block';
                    setTimeout(() => toggleRecovery(), 3000);
                }
            } else if (isSignup) {
                const { data, error } = await supabaseClient.auth.signUp({
                    email: email,
                    password: password,
                });

                if (error) {
                    errorMêsg.innerText = error.message;
                    errorMêsg.style.display = 'block';
                } else {
                    successMêsg.innerText = "Conta criada com sucesso! Faça login.";
                    successMêsg.style.display = 'block';
                    toggleMode(new Event('click')); // switch back to login
                }
            } else {
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password,
                });

                if (error) {
                    errorMêsg.innerText = "E-mail ou senha inválidos.";
                    errorMêsg.style.display = 'block';
                }
                // If success, auth.js onAuthStateChange will automatically redirect to turmas.html
            }

            btn.disabled = false;
            btn.style.opacity = '1';
        });
    </script>
</body>

</html>
