<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Coach Analytics | Acesso do Atleta</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-y: auto;
            background: var(--bg-dark);
            padding: 24px 16px;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(99, 102, 241, 0.06) 0%, transparent 50%);
            z-index: 0;
            pointer-events: none;
        }

        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            animation: fadeInUp 0.5s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            margin: 0 auto 16px;
            box-shadow: 0 8px 32px rgba(59, 130, 246, 0.4);
        }

        .login-header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        /* Steps */
        .step {
            display: none;
        }

        .step.active {
            display: block;
            animation: fadeInUp 0.3s ease-out;
        }

        /* Step 1: Athlete grid */
        .athletes-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }

        .athlete-btn {
            background: var(--bg-card);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            text-align: center;
            line-height: 1.3;
        }

        .athlete-btn:hover {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.08);
            color: var(--text-main);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.15);
        }

        .athlete-btn.selected {
            border-color: var(--primary);
            background: rgba(59, 130, 246, 0.12);
            color: var(--text-main);
        }

        .athlete-btn img {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .athlete-btn.selected img,
        .athlete-btn:hover img {
            border-color: var(--primary);
        }

        .athlete-btn .faixa-badge {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-hover);
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        /* Step 2: PIN */
        .pin-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
        }

        .pin-athlete-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .pin-header-text h2 {
            font-size: 18px;
            font-weight: 700;
        }

        .pin-header-text p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Numeric PIN display */
        .pin-dots {
            display: flex;
            justify-content: center;
            gap: 14px;
            margin: 24px 0;
        }

        .pin-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            background: transparent;
            transition: var(--transition);
        }

        .pin-dot.filled {
            background: var(--primary);
            border-color: var(--primary);
            box-shadow: 0 0 8px rgba(59, 130, 246, 0.6);
        }

        /* Numeric keypad */
        .keypad {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .key-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            padding: 16px;
            font-size: 20px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .key-btn:hover {
            background: var(--bg-hover);
            border-color: rgba(255, 255, 255, 0.1);
            transform: scale(0.97);
        }

        .key-btn:active {
            transform: scale(0.93);
            background: rgba(59, 130, 246, 0.15);
        }

        .key-btn .key-sub {
            font-size: 9px;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0.5px;
            margin-top: 3px;
        }

        .key-btn.key-del {
            font-size: 22px;
            color: var(--text-muted);
        }

        .key-btn.key-empty {
            background: transparent;
            border-color: transparent;
            pointer-events: none;
        }

        /* Error message */
        .error-message {
            text-align: center;
            color: var(--red);
            font-size: 13px;
            font-weight: 500;
            padding: 10px;
            background: var(--red-bg);
            border-radius: var(--radius-sm);
            margin-bottom: 16px;
            display: none;
            animation: shake 0.3s ease-out;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            60% {
                transform: translateX(8px);
            }

            80% {
                transform: translateX(-4px);
            }
        }

        /* Login card container */
        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .step-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .step-title i {
            color: var(--primary);
        }

        /* Footer */
        .login-footer {
            text-align: center;
            margin-top: 24px;
        }

        .login-footer a {
            color: var(--text-muted);
            font-size: 13px;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: var(--transition);
        }

        .login-footer a:hover {
            color: var(--text-main);
        }

        /* Empty state */
        .empty-athletes {
            text-align: center;
            padding: 32px 0;
            color: var(--text-muted);
        }

        .empty-athletes i {
            font-size: 48px;
            opacity: 0.4;
            margin-bottom: 12px;
            display: block;
        }

        /* Back btn */
        .btn-back {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            transition: var(--transition);
            font-family: inherit;
            padding: 0;
        }

        .btn-back:hover {
            color: var(--text-main);
        }

        /* Enter btn */
        .btn-enter {
            width: 100%;
            padding: 14px;
            border-radius: var(--radius-md);
            border: none;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-enter:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(59, 130, 246, 0.4);
        }

        .btn-enter:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        @media (max-width: 360px) {
            .athletes-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-header">
            <div class="login-logo"><i class="ti ti-shield-up"></i></div>
            <h1>Pro Coach Analytics</h1>
            <p>Acesso do Atleta</p>
        </div>

        <div class="login-card">

            <!-- Step 1: Select athlete -->
            <div class="step active" id="step1">
                <div class="step-title"><i class="ti ti-user"></i> Quem é você?</div>
                <div class="athletes-grid" id="athletesGrid">
                    <!-- JS Inject -->
                </div>
            </div>

            <!-- Step 2: PIN -->
            <div class="step" id="step2">
                <button class="btn-back" onclick="goBack()">
                    <i class="ti ti-arrow-left"></i> Trocar atleta
                </button>

                <div class="pin-header">
                    <img id="pinAthleteAvatar" src="" alt="" class="pin-athlete-avatar">
                    <div class="pin-header-text">
                        <h2 id="pinAthleteName">Atleta</h2>
                        <p>Digite seu PIN de 4 dígitos</p>
                    </div>
                </div>

                <div class="pin-dots" id="pinDots">
                    <div class="pin-dot" id="dot0"></div>
                    <div class="pin-dot" id="dot1"></div>
                    <div class="pin-dot" id="dot2"></div>
                    <div class="pin-dot" id="dot3"></div>
                </div>

                <div class="error-message" id="errorMessage">
                    <i class="ti ti-lock-x"></i> PIN incorreto. Tente novamente.
                </div>

                <div class="keypad">
                    <button class="key-btn" onclick="pressKey('1')">1</button>
                    <button class="key-btn" onclick="pressKey('2')">2 <span class="key-sub">ABC</span></button>
                    <button class="key-btn" onclick="pressKey('3')">3 <span class="key-sub">DEF</span></button>
                    <button class="key-btn" onclick="pressKey('4')">4 <span class="key-sub">GHI</span></button>
                    <button class="key-btn" onclick="pressKey('5')">5 <span class="key-sub">JKL</span></button>
                    <button class="key-btn" onclick="pressKey('6')">6 <span class="key-sub">MNO</span></button>
                    <button class="key-btn" onclick="pressKey('7')">7 <span class="key-sub">PQRS</span></button>
                    <button class="key-btn" onclick="pressKey('8')">8 <span class="key-sub">TUV</span></button>
                    <button class="key-btn" onclick="pressKey('9')">9 <span class="key-sub">WXYZ</span></button>
                    <button class="key-btn key-empty"></button>
                    <button class="key-btn" onclick="pressKey('0')">0</button>
                    <button class="key-btn key-del" onclick="deleteKey()"><i class="ti ti-backspace"></i></button>
                </div>

                <button class="btn-enter" id="btnEnter" onclick="doLogin()" disabled>
                    <i class="ti ti-login"></i> Entrar
                </button>
            </div>

        </div>

        <div class="login-footer">
            <a href="index.html"><i class="ti ti-lock"></i> Sou treinador</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        let selectedAthleteId = null;
        let pinValue = '';

        // Check if a specific athlete was pre-selected via URL param
        const urlParams = new URLSearchParams(window.location.search);
        const preSelectedId = urlParams.get('atleta') ? parseInt(urlParams.get('atleta')) : null;

        document.addEventListener('DOMContentLoaded', () => {
            renderAthletes();

            // Pre-select from URL param
            if (preSelectedId) {
                const atleta = db.alunos.find(a => a.id === preSelectedId);
                if (atleta) selectAthlete(preSelectedId);
            }
        });

        function renderAthletes() {
            const grid = document.getElementById('athletesGrid');
            const turmaId = db.activeTurmaId;
            const atletas = db.alunos.filter(a => a.turmaId === turmaId);

            if (atletas.length === 0) {
                grid.innerHTML = `
                    <div class="empty-athletes" style="grid-column: 1/-1">
                        <i class="ti ti-user-off"></i>
                        <p>Nenhum atleta cadastrado na turma ativa.</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = atletas.map(a => {
                const primeiroNome = a.nome.split(' ')[0];
                const faixaCurta = a.faixa ? a.faixa.replace(/\(.*?\)/g, '').trim() : '';
                return `
                    <button class="athlete-btn" onclick="selectAthlete(${a.id})" id="athleteBtn_${a.id}">
                        <img src="${a.avatar || 'https://i.pravatar.cc/150'}" alt="${a.nome}"
                             onerror="this.src='https://i.pravatar.cc/150'">
                        <span>${primeiroNome}</span>
                        ${faixaCurta ? `<span class="faixa-badge">${faixaCurta}</span>` : ''}
                    </button>
                `;
            }).join('');
        }

        function selectAthlete(id) {
            selectedAthleteId = id;
            const atleta = db.alunos.find(a => a.id === id);
            if (!atleta) return;

            // Update PIN screen
            document.getElementById('pinAthleteAvatar').src = atleta.avatar || 'https://i.pravatar.cc/150';
            document.getElementById('pinAthleteName').innerText = atleta.nome.split(' ')[0];

            // Switch to step 2
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');

            // Reset PIN
            resetPin();
        }

        function goBack() {
            selectedAthleteId = null;
            resetPin();
            document.getElementById('step2').classList.remove('active');
            document.getElementById('step1').classList.add('active');
        }

        function resetPin() {
            pinValue = '';
            updateDots();
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('btnEnter').disabled = true;
        }

        function pressKey(digit) {
            if (pinValue.length >= 4) return;
            pinValue += digit;
            updateDots();
            if (pinValue.length === 4) {
                document.getElementById('btnEnter').disabled = false;
                // Auto-submit
                setTimeout(() => doLogin(), 200);
            }
        }

        function deleteKey() {
            pinValue = pinValue.slice(0, -1);
            updateDots();
            document.getElementById('btnEnter').disabled = pinValue.length < 4;
            document.getElementById('errorMessage').style.display = 'none';
        }

        function updateDots() {
            for (let i = 0; i < 4; i++) {
                const dot = document.getElementById('dot' + i);
                dot.classList.toggle('filled', i < pinValue.length);
            }
        }

        function doLogin() {
            const atleta = db.alunos.find(a => a.id === selectedAthleteId);
            if (!atleta) return;

            const storedPin = atleta.pin || '0000';
            const errorEl = document.getElementById('errorMessage');

            if (pinValue === storedPin) {
                // Store logged-in athlete in sessionStorage
                sessionStorage.setItem('tkd_atleta_id', atleta.id);
                sessionStorage.setItem('tkd_atleta_nome', atleta.nome);

                // Redirect to athlete portal
                window.location.href = 'atleta-portal.html';
            } else {
                // Show error, shake animation
                errorEl.style.display = 'block';
                errorEl.style.animation = 'none';
                setTimeout(() => { errorEl.style.animation = 'shake 0.3s ease-out'; }, 10);
                resetPin();
            }
        }

        // Keyboard support
        document.addEventListener('keydown', (e) => {
            const step2Active = document.getElementById('step2').classList.contains('active');
            if (!step2Active) return;

            if (e.key >= '0' && e.key <= '9') pressKey(e.key);
            else if (e.key === 'Backspace') deleteKey();
            else if (e.key === 'Enter' && pinValue.length === 4) doLogin();
        });
    </script>
</body>

</html>
