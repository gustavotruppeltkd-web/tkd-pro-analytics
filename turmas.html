<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO COACH ANALYTICS | Selecione a Turma</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" />
    <style>
        body {
            min-height: 100vh;
            background-color: var(--bg-dark);
            margin: 0;
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        /* btn-back-link and btn-logout are in styles.css */
        /* btn-logout → btn-logout, btn-back → btn-back-link */

        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 72px;
            background: var(--bg-dark);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 0 32px;
        }

        .page-content {
            max-width: 1000px;
            width: 100%;
            margin: 96px auto 80px;
            padding: 0 32px;
        }

        .splash-container {
            text-align: center;
            animation: fadeIn 0.4s ease-in-out;
            max-width: 900px;
        }

        .splash-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .splash-subtitle {
            font-size: 16px;
            color: var(--text-muted);
            margin-bottom: 48px;
        }

        .profiles-grid {
            display: flex;
            gap: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .profile-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--bg-card);
            padding: 32px 24px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            min-width: 220px;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            position: relative;
            z-index: 5;
            pointer-events: auto !important;
        }

        .profile-card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.3);
        }

        .profile-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.1);
            color: var(--primary);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            margin-bottom: 24px;
            transition: var(--transition);
            pointer-events: none;
            overflow: hidden;
        }

        .profile-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .profile-card:hover .profile-icon {
            box-shadow: var(--shadow-glow);
        }

        .profile-card:hover .profile-icon:not(:has(img)) {
            background: var(--primary);
            color: #fff;
        }

        /* Upload de foto */
        .foto-upload-area {
            border: 2px dashed var(--border-color);
            border-radius: var(--radius-md);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .foto-upload-area:hover {
            border-color: var(--primary);
            background: rgba(59,130,246,0.05);
        }
        .foto-upload-area input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .foto-preview {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
            display: none;
            margin: 0 auto 8px;
        }
        .foto-preview.visible { display: block; }
        .foto-upload-label {
            font-size: 13px;
            color: var(--text-muted);
        }
        .foto-remove-btn {
            font-size: 11px;
            color: var(--red);
            cursor: pointer;
            display: none;
            margin-top: 4px;
            background: none;
            border: none;
            padding: 0;
        }
        .foto-remove-btn.visible { display: inline-block; }

        .profile-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 4px;
            pointer-events: none;
        }

        .profile-meta {
            font-size: 14px;
            color: var(--text-muted);
            pointer-events: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <!-- Fixed top bar -->
    <div class="topbar">
        <!-- Left: Trainer profile chip -->
        <div class="user-profile top-left-profile"
            style="position: absolute; left: 32px; border: 1px solid var(--border-color); padding: 8px 16px 8px 8px; border-radius: 50px; background: var(--bg-card); display: flex; align-items: center; gap: 12px; cursor: pointer;">
            <img src="https://cdn-icons-png.flaticon.com/512/10337/10337579.png" alt="Coach Profile" class="avatar"
                style="width: 32px; height: 32px; border-radius: 50%;">
            <div class="user-info" style="display: flex; flex-direction: column;">
                <span class="user-name" style="font-weight: 600; font-size: 13px;">Carregando...</span>
                <span class="user-role" style="color: var(--text-muted); font-size: 11px;">Treinador</span>
            </div>
        </div>

        <!-- Center: Logo -->
        <div style="display: flex; align-items: center; gap: 10px;">
            <i class="ti ti-shield-up" style="font-size: 26px; color: var(--primary);"></i>
            <span style="font-size: 20px; color: var(--text-main); font-weight: 700;">PRO COACH ANALYTICS</span>
        </div>

        <!-- Right: Logout -->
        <button class="btn-logout" onclick="window.logoutUser()">
            <i class="ti ti-logout"></i> Sair
        </button>
    </div>

    <!-- Scrollable main content -->
    <div class="page-content">
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px;">
            <h1 class="splash-title" style="margin-bottom: 0;">Selecione a Turma</h1>
            <div style="display: flex; gap: 8px;">
                <button class="btn btn-icon btn-outline" onclick="openModalEditar()" title="Editar Turma">
                    <i class="ti ti-pencil" style="font-size: 20px;"></i>
                </button>
                <button class="btn btn-icon btn-danger" onclick="openModalExcluir()" title="Excluir Turma">
                    <i class="ti ti-trash" style="font-size: 20px;"></i>
                </button>
                <button class="btn btn-primary" style="border-radius: 50px; padding: 12px 24px;" onclick="openModal()">
                    <i class="ti ti-plus"></i> Nova Turma
                </button>
            </div>
        </div>
        <p class="splash-subtitle" style="text-align: left;">Bem-vindo, <span class="user-name">Treinador</span>. Qual
            equipe deseja gerenciar agora?</p>

        <div style="text-align: left; margin-bottom: 16px;">
            <h2 style="color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Alto
                Rendimento (Competi&ccedil;&atilde;o)</h2>
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin-top: 8px; margin-bottom: 24px;">
        </div>

        <div class="profiles-grid" style="justify-content: flex-start; margin-bottom: 48px;" id="grid-rendimento">
            <!-- Populated via JS -->
        </div>

        <div style="text-align: left; margin-bottom: 16px;">
            <h2 style="color: var(--text-muted); font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Aulas
                Comerciais (Alunos)</h2>
            <hr style="border: 0; border-top: 1px solid var(--border-color); margin-top: 8px; margin-bottom: 24px;">
        </div>

        <div class="profiles-grid" style="justify-content: flex-start;" id="grid-comercial">
            <!-- Populated via JS -->
        </div>
    </div>

    <!-- Modals -->
    <div class="modal-overlay" id="modalNovaTurma">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Criar Nova Turma</h2>
                <button class="btn-close" type="button" onclick="closeModal()"><i class="ti ti-x"></i></button>
            </div>
            <form id="formNovaTurma" onsubmit="saveTurma(event)">
                <div class="form-group">
                    <label>Nome da Turma</label>
                    <input type="text" id="novaTurmaName" class="form-control"
                        placeholder="Ex: Preparat&oacute;rio Faixa Preta" required>
                </div>
                <div class="form-group">
                    <label>Foto da Turma <span style="color:var(--text-muted);font-weight:400;">(opcional)</span></label>
                    <div class="foto-upload-area" onclick="document.getElementById('novaTurmaFotoInput').click()">
                        <input type="file" id="novaTurmaFotoInput" accept="image/*" onchange="previewFoto(this,'novaTurmaFotoPreview','novaTurmaFotoRemove','novaTurmaFotoLabel')">
                        <img id="novaTurmaFotoPreview" class="foto-preview" src="" alt="Preview">
                        <div id="novaTurmaFotoLabel" class="foto-upload-label"><i class="ti ti-camera" style="font-size:20px;display:block;margin-bottom:4px;color:var(--primary);"></i>Clique para adicionar uma foto</div>
                        <button type="button" id="novaTurmaFotoRemove" class="foto-remove-btn" onclick="removeFoto(event,'novaTurmaFotoInput','novaTurmaFotoPreview','novaTurmaFotoRemove','novaTurmaFotoLabel')">✕ Remover foto</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Perfil (Tipo de Turma)</label>
                    <div class="radio-group">
                        <label class="radio-card selected" onclick="selectRadio(this, 'rendimento')">
                            <input type="radio" name="tipoTurma" value="rendimento" checked>
                            <i class="ti ti-medal radio-icon" style="font-size: 32px; margin-bottom: 12px;"></i>
                            <div class="radio-title" style="font-size: 16px;">Rendimento</div>
                            <div class="radio-desc">Foco em performance e scout.</div>
                        </label>
                        <label class="radio-card" onclick="selectRadio(this, 'comercial')">
                            <input type="radio" name="tipoTurma" value="comercial">
                            <i class="ti ti-cash radio-icon"
                                style="color: var(--green); font-size: 32px; margin-bottom: 12px;"></i>
                            <div class="radio-title" style="font-size: 16px;">Comercial</div>
                            <div class="radio-desc">Foco em mensalidades e presen&ccedil;a.</div>
                        </label>
                    </div>
                </div>
                <div class="form-group" style="margin-top: 32px;">
                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; justify-content: center; padding: 14px;">Criar Nova Turma</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modalEditarTurma">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Editar Turma</h2>
                <button class="btn-close" type="button" onclick="closeModalEditar()"><i class="ti ti-x"></i></button>
            </div>
            <form id="formEditarTurma" onsubmit="saveEditTurma(event)">
                <div class="form-group">
                    <label>Selecione a turma:</label>
                    <select class="form-control" id="selectTurmaEdit" required onchange="populateEditForm()"></select>
                </div>
                <div class="form-group" id="editFields" style="display: none;">
                    <label>Nome da Turma</label>
                    <input type="text" id="editNomeTurma" class="form-control" required>
                    <label style="margin-top:16px;display:block;">Foto da Turma <span style="color:var(--text-muted);font-weight:400;">(opcional)</span></label>
                    <div class="foto-upload-area" onclick="document.getElementById('editTurmaFotoInput').click()">
                        <input type="file" id="editTurmaFotoInput" accept="image/*" onchange="previewFoto(this,'editTurmaFotoPreview','editTurmaFotoRemove','editTurmaFotoLabel')">
                        <img id="editTurmaFotoPreview" class="foto-preview" src="" alt="Preview">
                        <div id="editTurmaFotoLabel" class="foto-upload-label"><i class="ti ti-camera" style="font-size:20px;display:block;margin-bottom:4px;color:var(--primary);"></i>Clique para trocar a foto</div>
                        <button type="button" id="editTurmaFotoRemove" class="foto-remove-btn" onclick="removeFoto(event,'editTurmaFotoInput','editTurmaFotoPreview','editTurmaFotoRemove','editTurmaFotoLabel')">✕ Remover foto</button>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 24px;">Salvar
                        Altera&ccedil;&otilde;es</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modalExcluirTurma">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" style="color: var(--red);">Excluir Turma</h2>
                <button class="btn-close" type="button" onclick="closeModalExcluir()"><i class="ti ti-x"></i></button>
            </div>
            <form onsubmit="deleteTurma(event)">
                <div class="form-group">
                    <label>Selecione para excluir:</label>
                    <select class="form-control" id="selectTurmaDelete" required></select>
                </div>
                <button type="submit" class="btn btn-danger" style="width: 100%; margin-top: 24px;">Excluir
                    Permanentemente</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="modalFirstTrainer"
        style="display: none; z-index: 2000; background: rgba(15, 23, 42, 0.95);">
        <div class="modal-content" style="max-width: 500px;">
            <h2 style="text-align: center; color: var(--primary); margin-bottom: 24px;">Bem-vindo(a)!</h2>
            <form onsubmit="saveFirstTrainer(event)">
                <div class="form-group">
                    <label>Nome Completo</label>
                    <input type="text" class="form-control" id="firstTrainerName" required>
                </div>
                <div class="form-group" style="margin-top: 16px;">
                    <label>Cargo</label>
                    <input type="text" class="form-control" id="firstTrainerRole" required>
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; margin-top: 32px;">Come&ccedil;ar</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase-client.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/app.js"></script>
    <script>
        const modal = document.getElementById('modalNovaTurma');
        const modalDel = document.getElementById('modalExcluirTurma');
        const modalEdit = document.getElementById('modalEditarTurma');

        function openModal() {
            document.getElementById('novaTurmaName').value = '';
            // Reset radio to default
            const radios = document.querySelectorAll('input[name="tipoTurma"]');
            radios.forEach(r => r.checked = r.value === 'rendimento');
            document.querySelectorAll('.radio-card').forEach((c, i) => {
                c.classList.toggle('selected', i === 0);
            });
            modal.classList.add('active');
        }
        function closeModal() { modal.classList.remove('active'); }
        function closeModalExcluir() { modalDel.classList.remove('active'); }
        function closeModalEditar() { modalEdit.classList.remove('active'); }

        function openModalExcluir() {
            renderTurmas();
            modalDel.classList.add('active');
        }

        function openModalEditar() {
            renderTurmas();
            document.getElementById('editFields').style.display = 'none';
            modalEdit.classList.add('active');
        }

        function renderTurmas() {
            const gridRend = document.getElementById('grid-rendimento');
            const gridCom = document.getElementById('grid-comercial');
            gridRend.innerHTML = '';
            gridCom.innerHTML = '';

            const selDel = document.getElementById('selectTurmaDelete');
            const selEdit = document.getElementById('selectTurmaEdit');
            selDel.innerHTML = '<option value="">Selecione...</option>';
            selEdit.innerHTML = '<option value="">Selecione...</option>';

            db.turmas.forEach(t => {
                const isRend = (t.tipo || '').toLowerCase().includes('rendimento');
                const target = isRend ? 'dashboard-turma-dados.html' : 'dashboard-aulas.html';

                const card = document.createElement('div');
                card.className = "profile-card " + (isRend ? 'competicao' : 'iniciante');
                card.onclick = () => {
                    db.activeTurmaId = t.id;
                    saveDB();
                    window.location.href = target;
                };

                const iconHtml = t.foto
                    ? `<img src="${t.foto}" alt="${t.nome}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`
                    : `<i class="ti ${isRend ? 'ti-medal' : 'ti-users'}"></i>`;

                card.innerHTML = `
                    <div class="profile-icon">${iconHtml}</div>
                    <span class="profile-name">${t.nome}</span>
                    <span class="profile-meta">${(db.alunos || []).filter(a => a.turmaId === t.id).length} ${isRend ? 'Atletas' : 'Alunos'} \u2022 Foco: ${isRend ? 'Scout' : 'Chamada'}</span>
                `;

                if (isRend) gridRend.appendChild(card);
                else gridCom.appendChild(card);

                const opt = `<option value="${t.id}">${t.nome}</option>`;
                selDel.innerHTML += opt;
                selEdit.innerHTML += opt;
            });
        }

        function saveTurma(event) {
            event.preventDefault();
            const fotoInput = document.getElementById('novaTurmaFotoInput');
            const fotoSrc = document.getElementById('novaTurmaFotoPreview').src;
            const hasFoto = document.getElementById('novaTurmaFotoPreview').classList.contains('visible');
            const nt = {
                id: Date.now(),
                nome: document.getElementById('novaTurmaName').value,
                alunosCount: 0,
                tipo: document.querySelector('input[name="tipoTurma"]:checked').value === 'rendimento' ? 'Rendimento' : 'Comercial',
                foto: hasFoto ? fotoSrc : null
            };
            db.turmas.push(nt);
            saveDB();
            renderTurmas();
            closeModal();
            // Reset foto fields
            removeFoto(null,'novaTurmaFotoInput','novaTurmaFotoPreview','novaTurmaFotoRemove','novaTurmaFotoLabel');
        }

        function deleteTurma(event) {
            event.preventDefault();
            const id = parseInt(document.getElementById('selectTurmaDelete').value);
            db.turmas = db.turmas.filter(x => x.id !== id);
            saveDB();
            renderTurmas();
            closeModalExcluir();
        }

        function populateEditForm() {
            const id = parseInt(document.getElementById('selectTurmaEdit').value);
            const turma = db.turmas.find(t => t.id === id);
            if (turma) {
                document.getElementById('editNomeTurma').value = turma.nome;
                document.getElementById('editFields').style.display = 'block';
                // Mostrar foto atual se existir
                const preview = document.getElementById('editTurmaFotoPreview');
                const removeBtn = document.getElementById('editTurmaFotoRemove');
                const label = document.getElementById('editTurmaFotoLabel');
                if (turma.foto) {
                    preview.src = turma.foto;
                    preview.classList.add('visible');
                    removeBtn.classList.add('visible');
                    label.style.display = 'none';
                } else {
                    preview.src = '';
                    preview.classList.remove('visible');
                    removeBtn.classList.remove('visible');
                    label.style.display = '';
                }
                document.getElementById('editTurmaFotoInput').value = '';
            } else {
                document.getElementById('editFields').style.display = 'none';
            }
        }

        function saveEditTurma(event) {
            event.preventDefault();
            const id = parseInt(document.getElementById('selectTurmaEdit').value);
            const turma = db.turmas.find(t => t.id === id);
            if (turma) {
                turma.nome = document.getElementById('editNomeTurma').value;
                const preview = document.getElementById('editTurmaFotoPreview');
                const hasFoto = preview.classList.contains('visible');
                turma.foto = hasFoto ? preview.src : null;
                saveDB();
                renderTurmas();
                closeModalEditar();
            }
        }

        function previewFoto(input, previewId, removeId, labelId) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const preview = document.getElementById(previewId);
                preview.src = e.target.result;
                preview.classList.add('visible');
                document.getElementById(removeId).classList.add('visible');
                document.getElementById(labelId).style.display = 'none';
            };
            reader.readAsDataURL(file);
        }

        function removeFoto(event, inputId, previewId, removeId, labelId) {
            if (event) event.stopPropagation();
            const input = document.getElementById(inputId);
            const preview = document.getElementById(previewId);
            const removeBtn = document.getElementById(removeId);
            const label = document.getElementById(labelId);
            if (input) input.value = '';
            if (preview) { preview.src = ''; preview.classList.remove('visible'); }
            if (removeBtn) removeBtn.classList.remove('visible');
            if (label) label.style.display = '';
        }

        function selectRadio(el, val) {
            document.querySelectorAll('.radio-card').forEach(rc => rc.classList.remove('selected'));
            el.classList.add('selected');
            const input = el.querySelector('input');
            if (input) input.checked = true;
        }

        function saveFirstTrainer(event) {
            event.preventDefault();
            db.treinadores = [{
                id: 1,
                nome: document.getElementById('firstTrainerName').value,
                role: document.getElementById('firstTrainerRole').value,
                avatar: 'https://cdn-icons-png.flaticon.com/512/10337/10337579.png'
            }];
            saveDB();
            document.getElementById('modalFirstTrainer').style.display = 'none';
            renderTurmas();
            if (typeof renderUserProfile === 'function') renderUserProfile();
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                if (!db.treinadores || db.treinadores.length === 0) {
                    document.getElementById('modalFirstTrainer').style.display = 'flex';
                }
                renderTurmas();
                const un = document.querySelector('.user-name');
                if (un && un.innerText === 'Carregando...') un.innerText = 'Treinador';
            }, 100);
        });
    </script>
</body>

</html>
